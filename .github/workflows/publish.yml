name: Publish Extension

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
            arch: arm64
          - os: macos-13
            target: darwin-x64
            arch: x64
          - os: ubuntu-latest
            target: linux-x64
            arch: x64
          - os: ubuntu-latest
            target: linux-arm64
            arch: arm64
          - os: windows-latest
            target: win32-x64
            arch: x64
          - os: windows-latest
            target: win32-arm64
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Rebuild node-pty for target
        run: npx @electron/rebuild -v 32.3.2 -m . --only node-pty
        env:
          npm_config_arch: ${{ matrix.arch }}

      - name: Package extension
        run: npx vsce package --target ${{ matrix.target }} --allow-missing-repository

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: "*.vsix"

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Publish all platforms
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: vsce publish --packagePath *.vsix --pat "$VSCE_PAT"
