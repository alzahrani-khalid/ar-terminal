<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11a8cd"/>
      <stop offset="100%" style="stop-color:#0dbc79"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="256" height="256" rx="48" ry="48" fill="url(#bg)"/>
  <!-- Terminal window frame -->
  <rect x="32" y="48" width="192" height="160" rx="12" ry="12" fill="none" stroke="#11a8cd" stroke-width="3" opacity="0.6"/>
  <!-- Title bar dots -->
  <circle cx="52" cy="64" r="5" fill="#f14c4c" opacity="0.8"/>
  <circle cx="68" cy="64" r="5" fill="#e5a510" opacity="0.8"/>
  <circle cx="84" cy="64" r="5" fill="#0dbc79" opacity="0.8"/>
  <!-- Arabic letter "ع" (Ain) - represents Arabic/RTL -->
  <text x="128" y="155" font-family="Geeza Pro, Arial" font-size="72" fill="url(#accent)" text-anchor="middle" font-weight="bold">ع</text>
  <!-- Terminal cursor -->
  <rect x="168" y="108" width="4" height="48" rx="2" fill="#e5a510" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <!-- Directional arrow (RTL indicator) -->
  <path d="M56 190 L40 180 L56 170" fill="none" stroke="#11a8cd" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
</svg>
